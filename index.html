<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Gold MVP - Cotação</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #d4af37; }
        h1 { color: #d4af37; margin-bottom: 0.5rem; }
        .price { font-size: 3rem; font-weight: bold; margin: 1rem 0; }
        .update { font-size: 0.8rem; color: #888; }
        button { background: #d4af37; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        button:hover { background: #b8962e; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>XAU / USD</h1>
        <p>Cotação do Ouro em Dólar</p>
        <div id="price" class="price">Carregando...</div>
        <div id="date" class="update"></div>
        <button onclick="buscarCotacao()">Atualizar Agora</button>
    </div>

    <script>
        async function buscarCotacao() {
            const priceDiv = document.getElementById('price');
            const dateDiv = document.getElementById('date');
            priceDiv.innerHTML = '<span class="loading">Buscando...</span>';

            try {
                // Usando AwesomeAPI (Não precisa de chave e é muito estável)
                const response = await fetch('https://awesomeapi.com.br');
                const data = await response.json();
                
                const cotacao = data.XAUUSD;
                const valor = parseFloat(cotacao.bid).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                const dataHora = new Date(cotacao.create_date).toLocaleString('pt-BR');

                priceDiv.innerText = valor;
                dateDiv.innerText = `Última atualização: ${dataHora}`;
            } catch (error) {
                priceDiv.innerHTML = '<span style="color: #ff4444;">Erro ao carregar</span>';
                console.error('Erro:', error);
            }
        }

        // Busca ao carregar a página
        buscarCotacao();
        
        // Atualiza automaticamente a cada 30 segundos
        setInterval(buscarCotacao, 30000);
    </script>
</body>
</html>
